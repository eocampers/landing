<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <!-- SEO Meta Tags -->
    <title>EO Campers</title>
    <meta name="description" content="EO Campers. Alquiler y camperización de furgonetas. Próximamente nuestra nueva web.">
    <meta name="keywords" content="EO Campers, campers, furgonetas camper, alquiler campers, camperización, camper, vanlife">
    <meta name="author" content="EO Campers">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.eocampers.com/">
    <meta property="og:title" content="EO Campers">
    <meta property="og:description" content="Alquiler y camperización de furgonetas. Próximamente nuestra nueva web.">
    <meta property="og:image" content="https://www.eocampers.com/logo.svg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.eocampers.com/">
    <meta property="twitter:title" content="EO Campers">
    <meta property="twitter:description" content="Alquiler y camperización de furgonetas. Próximamente nuestra nueva web.">
    <meta property="twitter:image" content="https://www.eocampers.com/logo.svg">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="alternate icon" href="favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #121212; /* Fondo oscuro */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            overflow: hidden; /* Evitar scroll */
        }

        .logo-container {
            width: 80%;
            max-width: 600px; /* Tamaño grande pero acotado para pantallas gigantes */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            /* Si el SVG adjunto es oscuro, se podría aplicar un filtro aquí. 
               Por ahora lo mostramos tal cual asumiendo que tiene contraste. */
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- He puesto logo.svg asumiendo que guardarás el archivo adjunto con ese nombre -->
        <img src="logo.svg" alt="EO Campers Logo">
    </div>
</body>
</html>
